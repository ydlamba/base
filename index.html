<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>lamba.sh</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Umami analytics — privacy-friendly, no cookies -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="0bdf3b08-df50-41ec-a686-0e83897d178d"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #040810;             /* cathode archive — deep blue-black */
      color: #E8ECF0;                   /* luminescent off-white */
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      cursor: none;
    }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; cursor: none; }

    /* Bottom-right placeholder note — always visible, low contrast */
    #note {
      position: fixed;
      right: 1.5rem;
      bottom: 1.25rem;
      color: rgba(232, 236, 240, 0.45);
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      font-style: italic;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    #note.show { opacity: 1; }

    /* Audio hint — top-left, fades out when audio unlocks */
    #audio-hint {
      position: fixed;
      left: 1.5rem;
      top: 1.25rem;
      color: rgba(232, 236, 240, 0.45);
      font-size: 0.70rem;
      letter-spacing: 0.06em;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    #audio-hint.show { opacity: 1; }
    #audio-hint.hide { opacity: 0; }

    /* Idle cursor hint — bottom-center, shows whenever the user goes idle */
    #idle-hint {
      position: fixed;
      left: 50%;
      bottom: 1.25rem;
      transform: translateX(-50%);
      color: rgba(232, 236, 240, 0.60);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    #idle-hint.show { opacity: 1; }
    #idle-hint.hide { opacity: 0; }

    /* GitHub link — bottom-left. The clickable hit-area is 48×48
       (transparent padding) while the visible icon stays 20×20 — much
       easier to hit on fast diagonal moves toward the corner. Cursor
       stays hidden over the link too. */
    #gh {
      position: fixed;
      left: 0.5rem;
      bottom: 0.25rem;
      width: 48px; height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(232, 236, 240, 0.45);
      transform-origin: center;
      transition: color 0.35s ease, transform 0.35s ease;
      z-index: 10;
      cursor: none;            /* override UA default (a → pointer) */
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    #gh:hover { color: rgba(232, 236, 240, 0.92); transform: scale(1.18); }
    #gh.clicking {
      color: #FFFFFF;
      transform: scale(1.45);
      transition: color 0.18s ease, transform 0.20s ease;
    }
    #gh svg { width: 20px; height: 20px; fill: currentColor; display: block; cursor: none; pointer-events: none; }

    /* Entry overlay — progress bar reflects real loading state, then
       transforms into a click-and-hold button. Holding rumbles audio
       up, shakes the screen, fills the button. On full charge, the
       button bursts and the overlay fades to reveal the scene. The
       button is also the audio-unlock gesture, so no separate hint
       is needed. */
    #boot {
      position: fixed;
      inset: 0;
      background: #040810;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      /* Body has cursor:none for the canvas experience; override here
         so the user can actually see their cursor while looking for
         the button. The overlay is removed on burst, so the canvas
         takes over and cursor:none returns naturally. */
      cursor: default;
      transition: opacity 0.85s ease-out;
    }
    #boot.exiting { opacity: 0; pointer-events: none; }

    .boot-content {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      position: relative;
      will-change: transform;
    }

    /* Loading phase */
    .boot-progress {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: opacity 0.45s ease;
    }
    #boot.ready .boot-progress { opacity: 0; pointer-events: none; }

    .progress-track {
      width: 220px;
      height: 1px;
      background: rgba(168, 220, 255, 0.15);
      position: relative;
      overflow: hidden;
    }
    .progress-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: #A8DCFF;
      box-shadow:
        0 0 10px rgba(168, 220, 255, 0.85),
        0 0 22px rgba(168, 220, 255, 0.40);
      transition: width 0.45s ease-out;
    }
    .progress-label {
      font-size: 0.66rem;
      letter-spacing: 0.18em;
      color: rgba(232, 236, 240, 0.40);
      text-transform: lowercase;
      font-style: italic;
    }

    /* Ready button */
    .boot-button {
      position: absolute;
      display: none;
      padding: 0.85rem 1.9rem;
      background: transparent;
      border: 1px solid rgba(168, 220, 255, 0.45);
      color: rgba(232, 236, 240, 0.85);
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.10em;
      cursor: pointer;
      overflow: hidden;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      will-change: transform, opacity, filter;
      transition:
        border-color 0.3s ease,
        color 0.3s ease,
        transform 0.55s cubic-bezier(0.16, 1, 0.3, 1),
        opacity 0.5s ease-out,
        filter 0.5s ease-out;
    }
    .boot-button .charge-fill {
      position: absolute;
      left: 50%; top: 50%;
      bottom: auto;
      width: 0%;
      height: 220%;
      background: radial-gradient(ellipse at center,
        rgba(168, 220, 255, 0.28) 0%,
        rgba(168, 220, 255, 0.15) 42%,
        rgba(168, 220, 255, 0.00) 72%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      filter: blur(2px);
      transition: width 0.06s linear, opacity 0.3s ease;
      opacity: 0.65;
    }
    .boot-button .button-label {
      position: relative;
      z-index: 1;
    }
    #boot.ready .boot-button {
      display: inline-block;
      animation: btnFadeIn 0.7s ease-out;
    }
    @keyframes btnFadeIn {
      0%   { opacity: 0; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }
    .boot-button:hover {
      border-color: rgba(168, 220, 255, 0.85);
      color: #DCEBFF;
    }
    #boot.holding .boot-button {
      border-color: rgba(168, 220, 255, 0.95);
      color: #FFFFFF;
    }
    #boot.holding .boot-button .charge-fill {
      opacity: 1;
    }
    #boot.bursting .boot-button {
      transform: scale(1.45);
      opacity: 0;
      filter: blur(4px) brightness(1.8);
      border-color: rgba(168, 220, 255, 1);
      box-shadow:
        0 0 60px rgba(168, 220, 255, 0.85),
        0 0 140px rgba(168, 220, 255, 0.45);
    }

    /* Mini-particles emitted from the button on burst — DOM phosphor
       dots with strong additive-style glow. They overlap with the
       WebGPU field's outward surge, blurring the line between the
       two so the button reads as breaking apart into the field. */
    .mini-particle {
      position: fixed;
      width: var(--size, 4px);
      height: var(--size, 4px);
      background: #A8DCFF;
      box-shadow:
        0 0 8px #A8DCFF,
        0 0 22px rgba(168, 220, 255, 0.7),
        0 0 46px rgba(168, 220, 255, 0.32);
      border-radius: 50%;
      pointer-events: none;
      z-index: 200;
      transform: translate(-50%, -50%);
      animation: miniBurst 1.2s cubic-bezier(0.18, 0.62, 0.42, 1.0) forwards;
      mix-blend-mode: screen;
    }
    @keyframes miniBurst {
      0%   { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
      80%  { opacity: 0.55; }
      100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.3); opacity: 0; }
    }

    .signal-shard {
      position: fixed;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 123, 28, 0.92), rgba(168, 220, 255, 0.38), transparent);
      box-shadow:
        0 0 8px rgba(255, 123, 28, 0.62),
        0 0 20px rgba(168, 220, 255, 0.22);
      pointer-events: none;
      z-index: 12;
      mix-blend-mode: screen;
      transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(0.2);
      animation: signalShard var(--dur) cubic-bezier(0.12, 0.76, 0.18, 1) forwards;
    }
    @keyframes signalShard {
      0%   { opacity: 0.95; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(0.2); }
      55%  { opacity: 0.8; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(calc(var(--rot) + var(--spin))) scaleX(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      #boot { transition: opacity 0.3s ease; }
      .boot-button { animation: none; }
      .mini-particle { animation: miniBurst 0.4s ease-out forwards; }
      .signal-shard { animation: signalShard 0.28s ease-out forwards; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="note">the message hasn't arrived yet</div>
  <div id="audio-hint">tap anywhere for sound</div>
  <div id="idle-hint">touch the signal</div>
  <div id="boot" aria-hidden="true">
    <div class="boot-content">
      <div class="boot-progress">
        <div class="progress-track"><div class="progress-fill"></div></div>
        <div class="progress-label">tuning</div>
      </div>
      <button class="boot-button" type="button" aria-label="hold to tune">
        <span class="charge-fill"></span>
        <span class="button-label">hold to tune</span>
      </button>
    </div>
  </div>
  <a id="gh" href="https://github.com/ydlamba/base" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">

    </svg>
  </a>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
